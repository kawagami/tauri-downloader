<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F8CFF"/>
      <stop offset="100%" stop-color="#2B3FBF"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#DCE8FF"/>
    </linearGradient>
  </defs>

  <!-- 背景圓角方塊 -->
  <rect x="64" y="64" width="896" height="896" rx="200" fill="url(#bg)"/>

  <!-- 剪貼簿外框 -->
  <rect x="272" y="232" width="480" height="600" rx="56"
        fill="none" stroke="#FFFFFF" stroke-opacity="0.55" stroke-width="40"/>
  <!-- 剪貼簿夾子 -->
  <rect x="412" y="176" width="200" height="112" rx="40" fill="#FFFFFF" fill-opacity="0.9"/>

  <!-- 下載箭頭 -->
  <g fill="url(#arrow)">
    <path d="M452 372
             h120
             v168
             h96
             L512 668
             L356 540
             h96
             Z"/>
  </g>

  <!-- 托盤（下載落點） -->
  <path d="M352 728 h320" stroke="#FFFFFF" stroke-width="48" stroke-linecap="round"/>
</svg>
